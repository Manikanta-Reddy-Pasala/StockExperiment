{% extends "v2/base.html" %}
{% block title %}Today's Picks - Trading Models{% endblock %}
{% block page_title %}Today's Picks{% endblock %}

{% block content %}
<style>
  .pos { color: #15a36b; } .neg { color: #d4453a; } .neutral { color: #4f5868; }
  .row-held { background: #fffbea !important; font-weight: 600; }
  .model-card-header { cursor: pointer; }
  .model-card-header:hover { background: #f1f5fc; }
  .badge-disabled { background: #6c757d; }
  .badge-held { background: #198754; }
  .badge-rank-1 { background: #ffd60a; color: #333; }
  .small-mute { font-size: 0.78rem; color: #8b95a5; }
</style>

<div id="picks_container">
  <div class="text-muted py-3 text-center">Loading…</div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 4 equity models to show. Order matters — first card is opened by default.
const MODELS = [
  {key: "momentum_n100_top5_max1",     title: "Momentum N100 Top-5 (mc=1)",        desc: "Monthly rotation • real Nifty 100 • 30d return"},
  {key: "n20_daily_large_only",        title: "N20 Daily ADV ∩ N100",              desc: "Daily rotation • top-20 ADV ∩ N100 • uptrend"},
  {key: "midcap_narrow_60d_breakout",  title: "Midcap 60d Breakout",               desc: "Event-driven • 60d-high + vol surge + 200d SMA"},
  {key: "momentum_pseudo_n100_adv",    title: "Pseudo-N100 ADV",                    desc: "Monthly rotation • top-100 ADV from N500 • yearly-PIT rebuild"},
];

const fmtINR = n => "₹" + Number(n||0).toLocaleString('en-IN', {maximumFractionDigits:2});
const fmtPct = n => (n>=0?"+":"") + Number(n||0).toFixed(2) + "%";
const cls = n => n>0?"pos":(n<0?"neg":"neutral");

async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    return await r.json();
  } catch (e) {
    return {success: false, error: e.message};
  }
}

function renderCard(m, idx, ranking, status) {
  const collapseId = "collapse_" + m.key;
  const disabled = status && status.success && status.enabled === false;
  const heldSym = status && status.success && status.current_position
    ? status.current_position.sym
    : null;

  const top = (ranking && ranking.ranking) || [];
  const rank1 = top[0];

  let rows = "";
  if (top.length === 0) {
    const note = (ranking && ranking.note) || 'No ranking JSON yet — generate one for this model.';
    rows = `<tr><td colspan="5" class="text-center text-muted py-3">
      <div class="mb-2">${note}</div>
      <button class="btn btn-sm btn-primary" onclick="runSignal('${m.key}', event)">
        <i class="bi bi-broadcast"></i> Run Signal for ${m.title}
      </button>
    </td></tr>`;
  } else {
    rows = top.map(r => {
      const held = heldSym && (heldSym.replace('NSE:','').replace('-EQ','') === r.symbol.replace('NSE:','').replace('-EQ',''));
      const rowCls = held ? 'row-held' : '';
      return `<tr class="${rowCls}">
        <td>${r.rank === 1 ? '<span class="badge badge-rank-1">★ 1</span>' : '#'+r.rank}</td>
        <td><strong>${r.symbol}</strong></td>
        <td class="small text-muted">${r.name || ''}</td>
        <td class="text-end ${cls(r.ret_30d_pct)}">${fmtPct(r.ret_30d_pct)}</td>
        <td class="text-end">${fmtINR(r.price)}</td>
      </tr>`;
    }).join('');
  }

  // Header badges
  let badges = '';
  if (disabled) badges += ' <span class="badge badge-disabled">DISABLED</span>';
  if (heldSym) badges += ` <span class="badge badge-held">HELD: ${heldSym.replace('NSE:','').replace('-EQ','')}</span>`;
  if (ranking && ranking.universe_size) badges += ` <span class="badge bg-secondary">universe ${ranking.universe_size}</span>`;

  const navHtml = status && status.success
    ? `<span class="small-mute">NAV ${fmtINR(status.nav)} · P&amp;L <span class="${cls(status.pnl_pct)}">${fmtPct(status.pnl_pct)}</span></span>`
    : '';

  const dateHtml = ranking && ranking.date
    ? `<span class="small-mute">${ranking.date}</span>`
    : '';

  // Top pick summary shown when collapsed — gives operator the most important
  // signal at a glance without needing to expand. Click header to see top-5.
  const isNearMiss = rank1 && rank1.name && rank1.name.includes('near-miss');
  const topPickHtml = rank1
    ? `<div class="mt-2 small">
         <span class="badge ${isNearMiss ? 'bg-warning text-dark' : 'badge-rank-1'} me-1">${isNearMiss ? 'NEAR' : '★ 1'}</span>
         <strong>${rank1.symbol}</strong>
         <span class="text-muted">${(rank1.name || '').replace(' (near-miss)', '')}</span>
         <span class="ms-2 ${cls(rank1.ret_30d_pct)}">${fmtPct(rank1.ret_30d_pct)}</span>
         <span class="ms-2 text-muted">${fmtINR(rank1.price)}</span>
       </div>`
    : '<div class="mt-2 small text-muted">No top pick available</div>';

  // Model-emitted note (e.g. midcap "no breakout today, showing near-miss")
  const noteHtml = (ranking && ranking.note)
    ? `<div class="alert alert-info py-2 px-3 small mb-0 rounded-0 border-0">
         <i class="bi bi-info-circle me-1"></i>${ranking.note}
       </div>`
    : '';

  return `
    <div class="card mb-3">
      <div class="card-header model-card-header d-flex justify-content-between align-items-center"
           data-bs-toggle="collapse" data-bs-target="#${collapseId}" aria-expanded="false">
        <div>
          <strong>${m.title}</strong>${badges}
          <i class="bi bi-chevron-down ms-1 small-mute"></i>
          <div class="small-mute mt-1">${m.desc}</div>
          ${topPickHtml}
        </div>
        <div class="text-end">
          ${navHtml}<br>${dateHtml}
        </div>
      </div>
      <div id="${collapseId}" class="collapse">
        ${noteHtml}
        <div class="table-responsive">
          <table class="table table-sm align-middle mb-0">
            <thead>
              <tr>
                <th>Rank</th><th>Symbol</th><th>Name</th>
                <th class="text-end">30d Return</th><th class="text-end">Price ₹</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

async function load() {
  const container = document.getElementById('picks_container');

  // Use portfolio.enabled as authoritative source for which models render.
  // triggers/status remains useful for ranking page context (NAV, P&L, pos).
  const pf = await fetchJSON('/admin/models/portfolio');
  const enabledMap = {};
  if (pf.success) {
    (pf.models || []).forEach(m => { enabledMap[m.model_name] = !!m.enabled; });
  }

  // Fire all fetches in parallel — 4 models × 2 endpoints
  const fetches = MODELS.map(async (m, idx) => {
    const [ranking, status] = await Promise.all([
      fetchJSON(`/admin/${m.key}/ranking?top=5`),
      fetchJSON(`/admin/models/${m.key}/triggers/status`),
    ]);
    return {m, idx, ranking, status};
  });
  const results = await Promise.all(fetches);
  results.sort((a, b) => a.idx - b.idx);

  // Hide disabled models entirely (authoritative via portfolio.enabled).
  // Fallback to triggers/status.enabled if portfolio not reachable.
  const isEnabled = r => {
    if (r.m.key in enabledMap) return enabledMap[r.m.key];
    return !(r.status && r.status.success && r.status.enabled === false);
  };
  const visible = results.filter(isEnabled);

  if (visible.length === 0) {
    container.innerHTML = '<div class="alert alert-warning text-center">' +
      'All models are disabled. Re-enable one from <a href="/admin/v2/settings" class="alert-link">Settings</a> to see picks.</div>';
    return;
  }
  // Re-index visible cards so the first stays open by default.
  container.innerHTML = visible.map((r, i) => renderCard(r.m, i, r.ranking, r.status)).join('');
}

async function runSignal(modelKey, ev) {
  if (ev) { ev.preventDefault(); ev.stopPropagation(); }
  const ok = await appModal.confirm('Run Signal',
    `Generate fresh ranking for <strong>${modelKey}</strong>?<br><br>` +
    'Runs the model\'s live_signal.py. Writes JSON to /tmp/manual_*.json. ' +
    'No orders placed.',
    {okLabel: 'Run', okClass: 'btn-primary'});
  if (!ok) return;
  try {
    const r = await fetch(`/admin/${modelKey}/run-signal`, {method: 'POST'});
    const d = await r.json();
    if (d.success) {
      await appModal.alert('Signal Started',
        `Model: <strong>${modelKey}</strong><br>Task: <code>${d.task_id}</code><br><br>Ranking will appear in ~30s. Picks page auto-refreshes every 60s.`,
        'success');
      setTimeout(load, 30000);
    } else {
      await appModal.alert('Failed', 'Error: <strong>' + (d.error || 'unknown') + '</strong>', 'danger');
    }
  } catch (e) {
    await appModal.alert('Network Error', e.message, 'danger');
  }
}

load();
setInterval(load, 60000);  // refresh every 60s
</script>
{% endblock %}
