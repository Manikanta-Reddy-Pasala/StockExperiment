{% extends "v2/base.html" %}
{% block title %}Today's Picks - Trading Models{% endblock %}
{% block page_title %}Today's Picks{% endblock %}

{% block content %}
<style>
  .pos { color: #15a36b; } .neg { color: #d4453a; } .neutral { color: #4f5868; }
  .row-held { background: #fffbea !important; font-weight: 600; }
  .model-card-header { cursor: pointer; }
  .model-card-header:hover { background: #f1f5fc; }
  .badge-disabled { background: #6c757d; }
  .badge-held { background: #198754; }
  .badge-rank-1 { background: #ffd60a; color: #333; }
  .small-mute { font-size: 0.78rem; color: #8b95a5; }
</style>

<div id="picks_container">
  <div class="text-muted py-3 text-center">Loading…</div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 4 equity models to show. `schedule` drives the next-rebalance display.
const MODELS = [
  {key: "momentum_n100_top5_max1",     title: "Nifty 100 Momentum",   desc: "Monthly rotation + mid-month check • real Nifty 100 • 15-trading-day return",        schedule: "monthly_midcheck"},
  {key: "n20_daily_large_only",        title: "Weekly Top-40",        desc: "Weekly rotation • top-40 ADV ∩ N100 • uptrend • −12% from-entry daily stop",   schedule: "weekly"},
  {key: "midcap_narrow_60d_breakout",  title: "Midcap Breakout",      desc: "Event-driven • 40-day high + vol surge + 200d SMA",                       schedule: "event"},
  {key: "momentum_pseudo_n100_adv",    title: "Liquid 100 Momentum",  desc: "Monthly rotation • top-100 ADV from N500 • rank-1 (fixed May universe anchor)",  schedule: "monthly"},
  {key: "momentum_retest_n500",        title: "Retest Momentum",      desc: "Monthly basket of 4 (top-120 ADV N500) • buy each within 20% of 20-EMA • retain top-4", schedule: "monthly", multi: 4},
  {key: "emerging_momentum",           title: "Emerging Momentum",    desc: "Single-position (max-1) momentum rotation on emerging mid/small caps (PIT N500 minus N100) • 30d vol-adj ret>0 • ≤₹3000 • retain-1 • monthly + mid-month (5% lead) • ½ profit-take @ +30%", schedule: "monthly_midcheck"},
];

// Format YYYY-MM-DD in local TZ (avoid toISOString → UTC date drift).
function _ymdLocal(d) {
  const p = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate());
}

// NSE trading holidays. SOURCE: /api/nse-holidays (served from the
// scheduler-maintained cache of the NSE official API, with a server-side
// hardcoded fallback). Populated on page load BEFORE the cards render so
// _isTradingDay / nextRebalance see the correct set. Starts empty and is
// filled by loadHolidays() — never reference it before that resolves.
const NSE_HOLIDAYS = new Set();

// Baked offline fallback (mirror of tools/shared/nse_calendar._FALLBACK_HOLIDAYS,
// weekday closures only). Used ONLY if the /api/nse-holidays fetch fails, so the
// page still computes sane next-rebalance dates without a network round trip.
const _FALLBACK_HOLIDAYS_JS = [
  '2025-10-21','2025-10-22','2025-11-05','2025-12-25',
  '2026-01-15','2026-01-26','2026-03-03','2026-03-26','2026-03-31','2026-04-03',
  '2026-04-14','2026-05-01','2026-05-28','2026-06-26','2026-09-14','2026-10-02',
  '2026-10-20','2026-11-10','2026-11-24','2026-12-25',
];

// Fetch the holiday list and populate NSE_HOLIDAYS. Fail-safe: on ANY error,
// seed from the baked fallback so the page never breaks. Resolves before render.
async function loadHolidays() {
  NSE_HOLIDAYS.clear();
  try {
    const r = await fetch('/api/nse-holidays', {cache: 'no-store'});
    const d = await r.json();
    const list = (d && Array.isArray(d.holidays) && d.holidays.length) ? d.holidays : _FALLBACK_HOLIDAYS_JS;
    list.forEach(x => NSE_HOLIDAYS.add(x));
  } catch (e) {
    _FALLBACK_HOLIDAYS_JS.forEach(x => NSE_HOLIDAYS.add(x));
  }
}

function _isTradingDay(d) {
  if (d.getDay() === 0 || d.getDay() === 6) return false;  // weekend
  return !NSE_HOLIDAYS.has(_ymdLocal(d));                   // NSE holiday
}

// First NSE TRADING day on/after a given local date (skips weekends + holidays).
function _firstWeekday(d) {
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  while (!_isTradingDay(x)) x.setDate(x.getDate()+1);
  return x;
}

// NSE trading days from tomorrow through `target` inclusive — skips weekends
// AND NSE holidays (via _isTradingDay). More meaningful for a trading model
// than raw calendar days.
function _tradingDaysUntil(target) {
  const now = new Date();
  let cur = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let n = 0;
  while (cur < target) {
    cur.setDate(cur.getDate() + 1);
    if (_isTradingDay(cur)) n++;   // skip weekends AND NSE holidays
  }
  return n;
}

// Compute the REAL next rebalance date+days for a given schedule, holiday-aware.
// Mirrors the shared tools/shared/rebalance_calendar.py rule exactly:
//   monthly         = first NSE trading day of each month
//   monthly_midcheck= + first trading day on/after the 15th (mid-month check)
//   weekly          = first NSE trading day of each ISO week (Mon-anchored)
//   daily           = every trading day
// We build the list of upcoming rebalance instants and pick the SOONEST one that
// has not already passed (>= today, so a rebalance day shows "today / 0 td").
// This fixes (a) monthly showing this-month's already-done date, and (b) weekly
// falling through to the event-driven fallback.
function nextRebalance(schedule) {
  const today = new Date();
  const startOfToday = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const y = today.getFullYear(), mo = today.getMonth(), dd = today.getDate();
  const pick = (cands) => cands.sort((a,b)=>a.d-b.d).find(c => c.d >= startOfToday);

  if (schedule === "monthly" || schedule === "monthly_midcheck") {
    const cands = [];
    // this month + next month month-starts (and mid-month checks if applicable)
    for (const dm of [0, 1, 2]) {
      cands.push({d: _firstWeekday(new Date(y, mo+dm, 1)), kind: 'monthly'});
      if (schedule === "monthly_midcheck")
        cands.push({d: _firstWeekday(new Date(y, mo+dm, 15)), kind: 'mid-month'});
    }
    const c = pick(cands);
    return {label: _ymdLocal(c.d), tradingDays: _tradingDaysUntil(c.d), kind: c.kind};
  }

  if (schedule === "weekly") {
    // ISO week anchored on Monday. Build the Monday of this week + next 3 weeks,
    // resolve each to its first trading day, pick the soonest not-yet-passed.
    const dow = (today.getDay() + 6) % 7;            // 0 = Monday
    const cands = [0, 1, 2, 3].map(w =>
      ({d: _firstWeekday(new Date(y, mo, dd - dow + w*7)), kind: 'weekly'}));
    const c = pick(cands);
    return {label: _ymdLocal(c.d), tradingDays: _tradingDaysUntil(c.d), kind: c.kind};
  }

  if (schedule === "daily") {
    let target = new Date(today);
    target.setDate(target.getDate() + 1);
    target = _firstWeekday(target);
    return {label: _ymdLocal(target), tradingDays: _tradingDaysUntil(target), kind: 'daily'};
  }

  return {label: 'event-driven', days: null, kind: 'event'};
}

const fmtINR = n => "₹" + Number(n||0).toLocaleString('en-IN', {maximumFractionDigits:2});
const fmtPct = n => (n>=0?"+":"") + Number(n||0).toFixed(2) + "%";
const cls = n => n>0?"pos":(n<0?"neg":"neutral");

async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    return await r.json();
  } catch (e) {
    return {success: false, error: e.message};
  }
}

// Stable per-model card slot id — used so each async fetch can find and
// populate its own card without touching the others.
function _cardSlotId(key) { return "card_slot_" + key; }

// Loading placeholder card — rendered INSTANTLY for every model so the page
// shell appears immediately. Each slot is replaced in place as its own
// ranking/status fetch resolves (see load()).
function renderLoadingCard(m) {
  return `
    <div class="card mb-3" id="${_cardSlotId(m.key)}">
      <div class="card-header d-flex justify-content-between align-items-center">
        <div>
          <strong>${m.title}</strong>
          <div class="small-mute mt-1">${m.desc}</div>
          <div class="mt-2 small text-muted">
            <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
            Loading ranking…
          </div>
        </div>
      </div>
    </div>
  `;
}

// Inline per-card error — shown only in the failing model's slot so a slow or
// broken model never blocks the others.
function renderErrorCard(m, msg) {
  return `
    <div class="card mb-3 border-danger" id="${_cardSlotId(m.key)}">
      <div class="card-header d-flex justify-content-between align-items-center">
        <div>
          <strong>${m.title}</strong>
          <div class="small-mute mt-1">${m.desc}</div>
          <div class="mt-2 small text-danger">
            <i class="bi bi-exclamation-triangle me-1"></i>Failed to load: ${msg || 'unknown error'}
          </div>
        </div>
        <div class="text-end">
          <button class="btn btn-sm btn-outline-primary mt-1"
                  onclick="runSignal('${m.key}', event)"
                  title="Force re-run live_signal with latest data">
            <i class="bi bi-arrow-clockwise"></i> Re-calculate
          </button>
        </div>
      </div>
    </div>
  `;
}

function renderCard(m, idx, ranking, status) {
  const collapseId = "collapse_" + m.key;
  const disabled = status && status.success && status.enabled === false;
  // OBSERVE: enabled model in signals_only mode — ranks/signals but no real orders.
  const observe = status && status.success && status.enabled !== false && status.signals_only === true;
  const heldSym = status && status.success && status.current_position
    ? status.current_position.sym
    : null;

  const top = (ranking && ranking.ranking) || [];
  const rank1 = top[0];

  let rows = "";
  if (top.length === 0) {
    const note = (ranking && ranking.note) || 'No ranking JSON yet — generate one for this model.';
    rows = `<tr><td colspan="5" class="text-center text-muted py-3">
      <div class="mb-2">${note}</div>
      <button class="btn btn-sm btn-primary" onclick="runSignal('${m.key}', event)" title="Force re-run live_signal with latest data">
        <i class="bi bi-arrow-clockwise"></i> Re-calculate ${m.title}
      </button>
    </td></tr>`;
  } else {
    rows = top.map(r => {
      const held = heldSym && (heldSym.replace('NSE:','').replace('-EQ','') === r.symbol.replace('NSE:','').replace('-EQ',''));
      const rowCls = held ? 'row-held' : '';
      // Multi (basket) models: the top-K names are ALL targets — badge them
      // "TARGET", not a single ★ rank-1. Single-position models keep ★ 1.
      let rankCell;
      if (m.multi) {
        rankCell = r.rank <= m.multi
          ? `<span class="badge bg-success">TARGET ${r.rank}</span>`
          : '#' + r.rank;
      } else {
        rankCell = r.rank === 1 ? '<span class="badge badge-rank-1">★ 1</span>' : '#' + r.rank;
      }
      return `<tr class="${rowCls}">
        <td>${rankCell}</td>
        <td><strong>${r.symbol}</strong></td>
        <td class="small text-muted">${r.name || ''}</td>
        <td class="text-end ${cls(r.ret_30d_pct)}">${fmtPct(r.ret_30d_pct)}</td>
        <td class="text-end">${fmtINR(r.price)}</td>
      </tr>`;
    }).join('');
  }

  // Header badges
  let badges = '';
  if (disabled) badges += ' <span class="badge badge-disabled">DISABLED</span>';
  if (observe) badges += ' <span class="badge bg-info text-dark" title="Enabled — emits signals but places no real orders">OBSERVE</span>';
  if (heldSym) badges += ` <span class="badge badge-held">HELD: ${heldSym.replace('NSE:','').replace('-EQ','')}</span>`;
  if (ranking && ranking.universe_size) badges += ` <span class="badge bg-secondary">universe ${ranking.universe_size}</span>`;

  const navHtml = status && status.success
    ? `<span class="small-mute">NAV ${fmtINR(status.nav)} · P&amp;L <span class="${cls(status.pnl_pct)}">${fmtPct(status.pnl_pct)}</span></span>`
    : '';

  const _dateLbl = ranking && ranking.generated_at
    ? (window.fmtIST ? window.fmtIST(ranking.generated_at) : ranking.generated_at)
    : (ranking && ranking.date ? (window.fmtISTDate ? window.fmtISTDate(ranking.date) : ranking.date) : null);
  const dateHtml = _dateLbl ? `<span class="small-mute" title="ranking generated">${_dateLbl}</span>` : '';

  // Schedule + next rebalance pill (always visible on every card)
  const _sched = nextRebalance(m.schedule);
  const schedPill = _sched.kind === 'event'
    ? `<span class="badge bg-secondary ms-1" title="Trades only when 40-day-high + vol + SMA all fire">event-driven</span>`
    : `<span class="badge bg-secondary ms-1" title="${_sched.kind} rotation">
         ${_sched.kind}: ${_sched.label}${_sched.tradingDays != null ? ` (${_sched.tradingDays} td)` : ''}
       </span>`;

  // Top pick summary shown when collapsed — gives operator the most important
  // signal at a glance without needing to expand. Click header to see top-5.
  const isNearMiss = rank1 && rank1.name && rank1.name.includes('near-miss');
  let topPickHtml;
  if (m.multi) {
    // Basket model: summarise the top-K target names, no single ★ rank-1.
    const basket = top.slice(0, m.multi);
    topPickHtml = basket.length
      ? `<div class="mt-2 small">
           <span class="badge bg-success me-1">Basket of ${m.multi}</span>
           ${basket.map(r => `<span class="me-2"><strong>${r.symbol}</strong> <span class="${cls(r.ret_30d_pct)}">${fmtPct(r.ret_30d_pct)}</span></span>`).join('')}
         </div>`
      : '<div class="mt-2 small text-muted">No targets available</div>';
  } else {
    topPickHtml = rank1
      ? `<div class="mt-2 small">
           <span class="badge ${isNearMiss ? 'bg-warning text-dark' : 'badge-rank-1'} me-1">${isNearMiss ? 'NEAR' : '★ 1'}</span>
           <strong>${rank1.symbol}</strong>
           <span class="text-muted">${(rank1.name || '').replace(' (near-miss)', '')}</span>
           <span class="ms-2 ${cls(rank1.ret_30d_pct)}">${fmtPct(rank1.ret_30d_pct)}</span>
           <span class="ms-2 text-muted">${fmtINR(rank1.price)}</span>
         </div>`
      : '<div class="mt-2 small text-muted">No top pick available</div>';
  }

  // Model-emitted note (e.g. midcap "no breakout today, showing near-miss")
  const noteHtml = (ranking && ranking.note)
    ? `<div class="alert alert-info py-2 px-3 small mb-0 rounded-0 border-0">
         <i class="bi bi-info-circle me-1"></i>${ranking.note}
       </div>`
    : '';

  // Held-vs-current-rank-1 banner — explains why UI may show a held symbol
  // that's NOT in today's top-5. Distinguishes:
  //   - Model-picked entry (regular monthly/daily rotation) → wait or force
  //   - Manual sync entry (LINK_FYERS_POSITION, SEED) → not a model pick
  let heldBannerHtml = '';
  if (heldSym && status && status.current_position && !m.multi) {
    const heldNorm = heldSym.replace('NSE:','').replace('-EQ','');
    const inTop = (top || []).some(r =>
      r.symbol.replace('NSE:','').replace('-EQ','') === heldNorm);
    const cp = status.current_position;
    const entryDate = cp.entry_date || '—';
    const reason = (cp.entry_reason || '').toUpperCase();
    const isManual = ['LINK_FYERS_POSITION','SEED','MANUAL'].includes(reason);
    const sched = nextRebalance(m.schedule);
    const rebalLine = sched.kind === 'event'
      ? 'Rebalance: event-driven (on next breakout trigger)'
      : `Next auto-rebalance: <strong>${sched.label}</strong> ${sched.tradingDays != null ? `(${sched.tradingDays} trading day${sched.tradingDays===1?'':'s'} left)` : ''} · ${sched.kind}`;

    const originLine = isManual
      ? `<span class="badge bg-info">MANUAL</span> Held <strong>${heldNorm}</strong> linked from broker on ${entryDate} (reason: <code>${reason}</code>) — NOT a model pick.`
      : reason
        ? `<span class="badge bg-primary">MODEL PICK</span> Entered <strong>${heldNorm}</strong> on ${entryDate} via <code>${reason}</code>.`
        : `Entered <strong>${heldNorm}</strong> on ${entryDate}.`;

    // Rotation models (monthly/mid-month/daily) hold ONLY rank-1 — being
    // anywhere in the top-5 is NOT "safe". Event-driven (midcap breakout)
    // holds until its own exit, so top-5 membership is the right gauge there.
    const heldIsRank1 = !!rank1 &&
      rank1.symbol.replace('NSE:','').replace('-EQ','') === heldNorm;
    const isEvent = sched.kind === 'event';
    let actionLine;
    let bannerCls;
    if (heldIsRank1 || (isEvent && inTop)) {
      actionLine = isEvent
        ? `Holding ${heldNorm} — exits on breakdown, not rank rotation.`
        : `Still rank-1 today — no rotation needed.`;
      bannerCls = 'alert-success';
    } else if (rank1) {
      const waitOrSell = sched.kind === 'monthly'
        ? `Two options: (a) <strong>Wait</strong> — auto-rebalance ${sched.label} will SELL ${heldNorm} + BUY ${rank1.symbol}. (b) <strong>Force now</strong> via Portfolio page Rebalance button.`
        : sched.kind === 'mid-month'
          ? `Mid-month check ${sched.label} — rotates only if rank-1 leads held by ≥5pp.`
          : sched.kind === 'daily'
            ? `Daily rotation — next session will SELL ${heldNorm} + BUY ${rank1.symbol}.`
            : `Will rotate to ${rank1.symbol} on next event trigger.`;
      actionLine = `Today's rank-1 is <strong>${rank1.symbol}</strong> (${fmtPct(rank1.ret_30d_pct)}). ${waitOrSell}`;
      bannerCls = isManual ? 'alert-info' : 'alert-warning';
    } else {
      actionLine = `No fresh ranking available — run signal first.`;
      bannerCls = 'alert-warning';
    }

    heldBannerHtml = `
      <div class="alert ${bannerCls} py-2 px-3 small mb-0 rounded-0 border-0">
        <div>${originLine}</div>
        <div class="mt-1"><i class="bi bi-arrow-right me-1"></i>${actionLine}</div>
        <div class="small-mute mt-1">${rebalLine}</div>
      </div>`;
  }

  return `
    <div class="card mb-3" id="${_cardSlotId(m.key)}">
      <div class="card-header model-card-header d-flex justify-content-between align-items-center"
           data-bs-toggle="collapse" data-bs-target="#${collapseId}" aria-expanded="false">
        <div>
          <strong>${m.title}</strong>${badges}${schedPill}
          <i class="bi bi-chevron-down ms-1 small-mute"></i>
          <div class="small-mute mt-1">${m.desc}</div>
          ${topPickHtml}
        </div>
        <div class="text-end">
          ${navHtml}<br>${dateHtml}
          <button class="btn btn-sm btn-outline-primary mt-1"
                  onclick="runSignal('${m.key}', event)"
                  title="Force re-run live_signal with latest data">
            <i class="bi bi-arrow-clockwise"></i> Re-calculate
          </button>
        </div>
      </div>
      <div id="${collapseId}" class="collapse">
        ${heldBannerHtml}
        ${noteHtml}
        <div class="table-responsive">
          <table class="table table-sm align-middle mb-0">
            <thead>
              <tr>
                <th>Rank</th><th>Symbol</th><th>Name</th>
                <th class="text-end">30d Return</th><th class="text-end">Price ₹</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div class="border-top px-3 py-2 d-flex justify-content-between align-items-center">
          <span class="small-mute">
            <i class="bi bi-clock-history me-1"></i>Scheduled signals (cron emissions only)
          </span>
          <a href="/picks/${encodeURIComponent(m.key)}/signals"
             class="btn btn-sm btn-outline-info"
             onclick="event.stopPropagation()">
            <i class="bi bi-list-ul"></i> View Signals (30d) →
          </a>
        </div>
      </div>
    </div>
  `;
}

async function load() {
  const container = document.getElementById('picks_container');

  // 1) On the FIRST paint, render the page shell + one LOADING card per model
  //    INSTANTLY so the page is interactive immediately; each card fills in as
  //    its own fetch lands. On the periodic 60s refresh, the existing cards are
  //    already present (one slot per model) — we update them in place rather
  //    than blanking back to spinners, so an expanded card doesn't flash.
  const hasSlots = MODELS.every(m => document.getElementById(_cardSlotId(m.key)));
  if (!hasSlots) {
    container.innerHTML = MODELS.map(m => renderLoadingCard(m)).join('');
  }

  // 2) Holidays drive nextRebalance() inside renderCard. Load once (cheap,
  //    fail-safe) and reuse across all card renders. Kick off in parallel with
  //    the portfolio fetch; both are awaited only by the per-card fillers.
  const holidaysReady = loadHolidays();

  // 3) Portfolio = authoritative enabled-map (which models stay visible).
  //    Fetched once, shared by every card. A disabled model removes its slot.
  const portfolioReady = fetchJSON('/admin/models/portfolio').then(pf => {
    const enabledMap = {};
    if (pf.success) {
      (pf.models || []).forEach(m => { enabledMap[m.model_name] = !!m.enabled; });
    }
    return enabledMap;
  });

  // 4) Fire each model's ranking+status INDEPENDENTLY and fill its own card as
  //    soon as that model's data arrives. A slow/failing model only affects its
  //    own slot — never blocks the others (no Promise.all over the whole set).
  let visibleCount = 0;
  let settled = 0;
  const fillers = MODELS.map(async (m, idx) => {
    const slotId = _cardSlotId(m.key);
    try {
      // ranking + status for THIS model only, in parallel.
      const [ranking, status, enabledMap] = await Promise.all([
        fetchJSON(`/admin/${m.key}/ranking?top=5`),
        fetchJSON(`/admin/models/${m.key}/triggers/status`),
        portfolioReady,
      ]);
      await holidaysReady;  // ensure nextRebalance() sees correct holiday set

      const slot = document.getElementById(slotId);
      if (!slot) return;  // card removed by a concurrent reload

      // Hide disabled models entirely (authoritative via portfolio.enabled,
      // fallback to triggers/status.enabled if portfolio unreachable).
      const enabled = (m.key in enabledMap)
        ? enabledMap[m.key]
        : !(status && status.success && status.enabled === false);
      if (!enabled) {
        slot.remove();
        return;
      }

      // Replace the loading placeholder with the fully-rendered card in place.
      const tmp = document.createElement('div');
      tmp.innerHTML = renderCard(m, idx, ranking, status);
      slot.replaceWith(tmp.firstElementChild);
      visibleCount++;
    } catch (e) {
      const slot = document.getElementById(slotId);
      if (slot) {
        const tmp = document.createElement('div');
        tmp.innerHTML = renderErrorCard(m, e && e.message);
        slot.replaceWith(tmp.firstElementChild);
        visibleCount++;  // an error card is still a visible slot
      }
    } finally {
      settled++;
      // After every model has settled, if nothing is visible (all disabled),
      // show the same "all disabled" guidance as before.
      if (settled === MODELS.length && visibleCount === 0) {
        container.innerHTML = '<div class="alert alert-warning text-center">' +
          'All models are disabled. Re-enable one from <a href="/admin/v2/settings" class="alert-link">Settings</a> to see picks.</div>';
      }
    }
  });
  // Returned promise resolves once all cards have settled (used by runSignal()).
  await Promise.all(fillers);
}

async function runSignal(modelKey, ev) {
  if (ev) { ev.preventDefault(); ev.stopPropagation(); }
  const ok = await appModal.confirm('Re-calculate (Preview)',
    `Re-run <strong>${modelKey}</strong>'s live_signal now?<br><br>` +
    '<strong>Preview only.</strong> Fresh ranking is shown for comparison.<br>' +
    '<strong>NOT stored</strong> in Signal History. Schedule still drives real orders.<br>' +
    'Updates page in 10-60s.',
    {okLabel: 'Re-calculate', okClass: 'btn-primary'});
  if (!ok) return;
  try {
    // ?recalc=1 forces synchronous re-run with --force; live_signal skips
    // audit write_signal on force, so this call does NOT pollute history.
    const r = await fetch(`/admin/${modelKey}/ranking?top=5&recalc=1`, {cache: 'no-store'});
    const d = await r.json();
    if (d.success) {
      // Build a "held vs fresh pick" diff before reloading cards.
      let diffHtml = '';
      try {
        const pf = await fetchJSON('/admin/models/portfolio');
        const m = (pf.models || []).find(x => x.model_name === modelKey);
        const heldSym = m && m.open_symbol ? m.open_symbol : null;
        const heldQty = m && m.open_qty ? m.open_qty : 0;
        const heldPx  = m && m.open_entry_px ? m.open_entry_px : 0;
        const top = (d.ranking || [])[0];
        if (top) {
          const newSym = top.symbol || '—';
          const newPx  = top.price || 0;
          const newRet = top.ret_30d_pct;
          if (heldSym && _normSym(heldSym) === _normSym(newSym)) {
            diffHtml = '<div class="alert alert-success py-2 small mb-0">' +
              '<strong>No change.</strong> Held <code>' + heldSym + '</code> still rank-1. ' +
              'Schedule will NOT rotate at next rebalance.</div>';
          } else if (heldSym) {
            diffHtml = '<div class="alert alert-warning py-2 small mb-0">' +
              '<strong>Diff detected:</strong><br>' +
              'Held: <code>' + heldSym + '</code> x' + heldQty + ' @ ₹' + Number(heldPx).toFixed(2) + '<br>' +
              'Fresh rank-1: <code>' + newSym + '</code> @ ₹' + Number(newPx).toFixed(2) +
              (newRet != null ? ' (' + (newRet>=0?'+':'') + Number(newRet).toFixed(2) + '%)' : '') + '<br>' +
              '<em>Schedule decides if/when to rotate. This preview is not stored.</em></div>';
          } else {
            diffHtml = '<div class="alert alert-info py-2 small mb-0">' +
              'Currently flat. Fresh rank-1: <code>' + newSym + '</code> @ ₹' + Number(newPx).toFixed(2) +
              (newRet != null ? ' (' + (newRet>=0?'+':'') + Number(newRet).toFixed(2) + '%)' : '') + '<br>' +
              '<em>Schedule decides entry. This preview is not stored.</em></div>';
          }
        }
      } catch(_) {}
      await load();
      await appModal.alert('Re-calculated (Preview)',
        '<div class="mb-2"><strong>Model:</strong> <code>' + modelKey + '</code> ' +
        (d.ran_now ? '<span class="badge bg-success ms-1">fresh</span>' : '<span class="badge bg-secondary ms-1">cached</span>') +
        ' <span class="badge bg-light text-dark ms-1">not stored</span></div>' +
        diffHtml,
        'info');
    } else {
      await appModal.alert('Failed', 'Error: <strong>' + (d.error || 'unknown') + '</strong>', 'danger');
    }
  } catch (e) {
    await appModal.alert('Network Error', e.message, 'danger');
  }
}

function _normSym(s) {
  if (!s) return '';
  return s.toUpperCase().replace(/^NSE:/, '').replace(/-EQ$/, '');
}

load();
setInterval(load, 60000);  // refresh every 60s
</script>
{% endblock %}
